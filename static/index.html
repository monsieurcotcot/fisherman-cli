<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisherman Game - Stats</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0e0e10;
            color: #efeff1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #18181b;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 400px;
        }
        h1 { color: #9146ff; }
        .stats-box {
            margin-top: 1.5rem;
            background: #26262c;
            padding: 1rem;
            border-radius: 8px;
            text-align: left;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0;
            border-bottom: 1px solid #3a3a3d;
            padding-bottom: 0.3rem;
        }
        .xp-bar-container {
            background: #3a3a3d;
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }
        .xp-bar-fill {
            background: linear-gradient(90deg, #9146ff, #bf94ff);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
        }
        .level-badge {
            background: #9146ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .fish-slot {
            width: 60px;
            height: 60px;
            background: #26262c;
            border: 1px solid #3a3a3d;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }
        .fish-slot .icon {
            font-size: 1.2rem;
            margin-top: -5px;
        }
        .fish-slot .name-label {
            font-size: 0.5rem;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 2px;
            background: rgba(0,0,0,0.5);
            position: absolute;
            bottom: 0;
            color: #efeff1;
        }
        .fish-slot:hover {
            transform: scale(1.15);
            border-color: #9146ff;
            z-index: 10;
        }
        .fish-slot .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .inventory-container {
            max-height: 250px;
            overflow-y: auto;
            background: #1f1f23;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3a3a3d;
            margin-top: 10px;
        }

        /* Styles pour le filtrage */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #26262c;
            border: 1px solid #3a3a3d;
            color: #adadb8;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: #9146ff;
            color: #efeff1;
        }
        .filter-btn.active {
            background: #9146ff;
            color: white;
            border-color: #9146ff;
        }
        
        /* Modal pour les détails */
        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f1f23;
            border: 2px solid #9146ff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
            width: 300px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }

        .search-box {
            margin-bottom: 1rem;
            display: flex;
            gap: 10px;
        }
        input {
            background: #3a3a3d;
            border: none;
            color: white;
            padding: 0.5rem;
            border-radius: 4px;
            flex-grow: 1;
        }
        button {
            background: #9146ff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #772ce8; }
        #error { color: #ff4f4f; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 Fisherman Stats</h1>
        
        <div class="search-box">
            <input type="text" id="usernameInput" placeholder="Ton pseudo Twitch...">
            <button onclick="fetchStats()">Voir</button>
        </div>

        <div id="statsDisplay" style="display: none;">
            <div class="stats-box">
                <div class="stat-item">
                    <span>Pseudo: <strong id="res-username"></strong></span>
                    <div>
                        <span id="res-vip" class="level-badge" style="background: #ffb444; color: #18181b; display: none; margin-right: 5px;">VIP</span>
                        <span class="level-badge">Niv. <span id="res-level"></span></span>
                    </div>
                </div>
                <div class="stat-item"><span>XP: <span id="res-xp-text"></span></span></div>
                <div class="xp-bar-container">
                    <div id="res-xp-fill" class="xp-bar-fill"></div>
                </div>
                <div style="margin-top: 15px;">
                    <div class="stat-item"><span>Tentatives:</span> <strong id="res-total"></strong></div>
                    <div class="stat-item"><span>Succès:</span> <strong id="res-success" style="color: #00ff00;"></strong></div>
                    <div class="stat-item"><span>Échecs:</span> <strong id="res-failed" style="color: #ff4f4f;"></strong></div>
                </div>

                <h3 style="margin-top: 20px; color: #9146ff; border-bottom: 1px solid #3a3a3d; padding-bottom: 5px;">🎒 Inventaire</h3>
                
                <div class="filter-bar" id="filterBar">
                    <button class="filter-btn active" data-rarity="all" onclick="filterCatches('all')">Tous</button>
                    <button class="filter-btn" data-rarity="common" onclick="filterCatches('common')">Commun</button>
                    <button class="filter-btn" data-rarity="uncommon" onclick="filterCatches('uncommon')">Peu commun</button>
                    <button class="filter-btn" data-rarity="rare" onclick="filterCatches('rare')">Rare</button>
                    <button class="filter-btn" data-rarity="veryrare" onclick="filterCatches('veryrare')">Très rare</button>
                    <button class="filter-btn" data-rarity="epic" onclick="filterCatches('epic')">Épique</button>
                    <button class="filter-btn" data-rarity="legendary" onclick="filterCatches('legendary')">Légendaire</button>
                    <button class="filter-btn" data-rarity="mythical" onclick="filterCatches('mythical')">Mythique</button>
                </div>

                <div class="inventory-container">
                    <div id="res-inventory" class="inventory-grid">
                        <!-- Grille de cases -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal pour les détails du poisson -->
        <div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
        <div id="fishModal" class="modal">
            <h2 id="modal-name" style="margin-top: 0; color: #9146ff;"></h2>
            <div style="border-top: 1px solid #3a3a3d; margin: 10px 0; padding-top: 10px;">
                <p><strong>Rareté:</strong> <span id="modal-rarity"></span></p>
                <p><strong>Taille:</strong> <span id="modal-size"></span> cm</p>
                <p><strong>Poids:</strong> <span id="modal-weight"></span> g</p>
                <p><strong>État:</strong> <span id="modal-state"></span></p>
                <p style="font-size: 0.8rem; color: #adadb8; margin-top: 10px;">
                    📅 <span id="modal-date"></span><br>
                    🎥 <span id="modal-stream"></span>
                </p>
                <p style="font-style: italic; color: #efeff1; margin-top: 15px;" id="modal-desc"></p>
            </div>
            <button onclick="closeModal()" style="width: 100%; margin-top: 10px;">Fermer</button>
        </div>
        
        <div class="stats-box">
            <h3>🏆 Top 10 Pêcheurs</h3>
            <div id="leaderboardList">Chargement...</div>
        </div>
        <div id="error">Joueur non trouvé ou erreur.</div>

        <footer style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #3a3a3d; font-size: 0.8rem; color: #adadb8;">
            <p>© 2026 MonsieurCotCot. Tous droits réservés.</p>
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 0.5rem;">
                <a href="https://twitch.tv/MonsieurCotCot" target="_blank" style="color: #9146ff; text-decoration: none;">Twitch</a>
                <a href="https://discord.gg/kVS2thqeZw" target="_blank" style="color: #5865F2; text-decoration: none; font-weight: bold;">Discord</a>
                <a href="https://twitter.com/MonsieurCotCot" target="_blank" style="color: #9146ff; text-decoration: none;">Twitter</a>
                <a href="https://youtube.com/@MonsieurCotCot" target="_blank" style="color: #9146ff; text-decoration: none;">YouTube</a>
                <a href="https://instagram.com/MonsieurCotCot" target="_blank" style="color: #9146ff; text-decoration: none;">Instagram</a>
            </div>
        </footer>
    </div>

    <script>
        // Protection discrète contre l'inspection simple
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        };

        // Charger le leaderboard au démarrage
        fetchLeaderboard();

        const path = window.location.pathname;
        if (path.startsWith('/player/')) {
            const username = path.split('/').pop();
            document.getElementById('usernameInput').value = username;
            fetchStats(username);
        }

        async function fetchLeaderboard() {
            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();
                const list = document.getElementById('leaderboardList');
                list.innerHTML = '';
                data.top.forEach((p, i) => {
                    const item = document.createElement('div');
                    item.className = 'stat-item';
                    
                    const nameLink = document.createElement('a');
                    nameLink.textContent = `#${i+1} ${p.username}`;
                    nameLink.href = `/player/${p.username}`;
                    nameLink.style.color = "#9146ff";
                    nameLink.style.textDecoration = "none";
                    nameLink.style.cursor = "pointer";
                    
                    const scoreStrong = document.createElement('strong');
                    scoreStrong.textContent = `${p.success} 🐟`;
                    
                    item.appendChild(nameLink);
                    item.appendChild(scoreStrong);
                    list.appendChild(item);
                });
            } catch (err) { console.error(err); }
        }

        let allCatches = [];

        async function fetchStats(u) {
            const username = u || document.getElementById('usernameInput').value;
            if (!username) return;

            try {
                const response = await fetch(`/api/stats/${username}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('statsDisplay').style.display = 'none';
                } else {
                    document.getElementById('error').style.display = 'none';
                    document.getElementById('statsDisplay').style.display = 'block';
                    document.getElementById('res-username').innerText = data.username;
                    document.getElementById('res-level').innerText = data.level;
                    document.getElementById('res-vip').style.display = data.is_vip ? 'inline' : 'none';
                    document.getElementById('res-xp-text').innerText = `${data.xp} / ${data.xp_next}`;
                    const percent = (data.xp / data.xp_next) * 100;
                    document.getElementById('res-xp-fill').style.width = `${percent}%`;
                    
                    document.getElementById('res-total').textContent = data.total;
                    document.getElementById('res-success').textContent = data.success;
                    document.getElementById('res-failed').textContent = data.failed;

                    // Stocker pour le filtrage
                    allCatches = data.catches || [];
                    filterCatches('all');
                }
            } catch (err) {
                console.error(err);
            }
        }

        function filterCatches(rarity) {
            // Update buttons UI
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-rarity') === rarity);
            });

            const inv = document.getElementById('res-inventory');
            inv.innerHTML = '';
            
            const filtered = rarity === 'all' 
                ? allCatches 
                : allCatches.filter(f => f.rarity.toLowerCase() === rarity);

            if (filtered.length > 0) {
                filtered.forEach(f => {
                    const slot = document.createElement('div');
                    slot.className = 'fish-slot';
                    
                    const icon = document.createElement('span');
                    icon.className = 'icon';
                    icon.textContent = '🐟';
                    slot.appendChild(icon);

                    const label = document.createElement('div');
                    label.className = 'name-label';
                    label.textContent = f.name;
                    slot.appendChild(label);
                    
                    const rarityColors = {
                        'common': '#efeff1',
                        'uncommon': '#1fa363',
                        'rare': '#00e6ff',
                        'veryrare': '#9146ff',
                        'epic': '#ff4ce2',
                        'legendary': '#ffb444',
                        'mythical': '#ff4f4f'
                    };
                    const color = rarityColors[f.rarity.toLowerCase().replace(/\s/g, '')] || '#efeff1';
                    slot.style.borderColor = color;

                    const badge = document.createElement('div');
                    badge.className = 'badge';
                    badge.style.backgroundColor = color;
                    slot.appendChild(badge);

                    slot.onclick = () => showFishDetails(f, color);
                    inv.appendChild(slot);
                });
            } else {
                inv.innerHTML = '<p style="font-size: 0.8rem; color: #adadb8; grid-column: span 4; text-align: center; padding: 20px;">Aucun poisson dans cette catégorie.</p>';
            }
        }

        function showFishDetails(fish, color) {
            document.getElementById('modal-name').textContent = fish.name;
            document.getElementById('modal-name').style.color = color;
            document.getElementById('modal-rarity').textContent = fish.rarity;
            document.getElementById('modal-rarity').style.color = color;
            document.getElementById('modal-size').textContent = fish.size;
            document.getElementById('modal-weight').textContent = fish.weight;
            document.getElementById('modal-state').textContent = fish.state;
            document.getElementById('modal-desc').textContent = fish.description;

            // Date et Stream
            const date = new Date(fish.caught_at);
            document.getElementById('modal-date').textContent = date.toLocaleDateString('fr-FR', {
                day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            document.getElementById('modal-stream').textContent = fish.stream_title || "Hors live";

            document.getElementById('fishModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('fishModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
