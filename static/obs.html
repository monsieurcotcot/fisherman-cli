<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OBS Alerts Overlay</title>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Uniquement sonore, pas d'élément visuel -->

    <script>
        // Récupérer le token depuis les paramètres d'URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            console.error("Token d'accès manquant.");
            document.body.innerHTML = "<div style='color: red; font-size: 20px; font-family: sans-serif; padding: 20px;'>Erreur: Token d'accès manquant (?token=...)</div>";
        } else {
            // Connexion au flux SSE
            const eventSource = new EventSource(`/api/obs/stream?token=${token}`);
            
            eventSource.onopen = () => {
                console.log("Connecté au flux d'alertes OBS (Audio-only).");
            };
            
            eventSource.onerror = (err) => {
                console.error("Erreur de connexion SSE, reconnexion...", err);
            };
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === "banana") {
                        playBananaAlert(data.username);
                    }
                } catch (e) {
                    console.error("Erreur de parsing des données reçues:", e);
                }
            };
        }

        function playBananaAlert(username) {
            // Jouer le son MP3 personnalisé
            const audio = new Audio(`/static/sounds/${username}.mp3`);
            audio.play().catch(err => {
                console.error("Impossible de jouer le son:", err);
            });
        }
    </script>
</body>
</html>
