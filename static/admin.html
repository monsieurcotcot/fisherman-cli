<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fisherman Admin</title>
    <style>
        body { font-family: sans-serif; background: #0e0e10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #18181b; padding: 2rem; border-radius: 10px; text-align: center; border: 1px solid #9146ff; width: 450px; }
        .btn { display: block; text-decoration: none; padding: 12px; margin: 15px 0; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; width: 100%; font-size: 1rem; }
        .btn-bot { background: #9146ff; color: white; }
        .btn-streamer { background: #00e6ff; color: #0e0e10; }
        .info { color: #adadb8; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Panel Admin</h1>
        <p style="color: #adadb8; font-size: 0.9rem;">Cliquez pour vous authentifier. (Version Forcée)</p>
        
        <div id="links">
            <button onclick="auth('bot')" class="btn btn-bot">🤖 Connecter le Bot</button>
            <button onclick="auth('streamer')" class="btn btn-streamer">👑 Connecter le Streameur</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = "8ibsok6lg0nn4kqartpsf7i0bc1h3s";

        function auth(type) {
            // Construction manuelle STRRICTE sans encodage pour matcher le test manuel
            const url = "https://id.twitch.tv/oauth2/authorize" +
                        "?client_id=" + CLIENT_ID +
                        "&redirect_uri=https://fisherman-cli.monsieurcotcot.com/auth/callback" +
                        "&response_type=code" +
                        "&scope=chat:read+chat:edit+channel:manage:vips" +
                        "&state=" + type;
            
            window.location.href = url;
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.get('token')) {
            document.getElementById('links').innerHTML = "<p style='color:red;'>⚠️ Token d'accès manquant !</p>";
        }
    </script>
</body>
</html>
