<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fisherman Admin</title>
    <style>
        body { font-family: sans-serif; background: #0e0e10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #18181b; padding: 2rem; border-radius: 10px; text-align: center; border: 1px solid #9146ff; width: 350px; }
        .btn { display: block; text-decoration: none; padding: 12px; margin: 15px 0; border-radius: 4px; font-weight: bold; }
        .btn-bot { background: #9146ff; color: white; }
        .btn-streamer { background: #00e6ff; color: #0e0e10; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Panel Admin</h1>
        <p style="color: #adadb8; font-size: 0.9rem;">Connectez les comptes pour activer le bot.</p>
        
        <div id="links">
            <a href="#" id="link-bot" class="btn btn-bot">🤖 Connecter le Bot</a>
            <a href="#" id="link-streamer" class="btn btn-streamer">👑 Connecter le Streameur</a>
        </div>
    </div>

    <script>
        // Récupérer le token depuis l'URL actuelle
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            document.getElementById('link-bot').href = `/auth/login?type=bot&token=${token}`;
            document.getElementById('link-streamer').href = `/auth/login?type=streamer&token=${token}`;
        } else {
            document.getElementById('links').innerHTML = "<p style='color:red;'>Token manquant !</p>";
        }
    </script>
</body>
</html>
